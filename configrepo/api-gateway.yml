server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: client-service
          uri: lb://CLIENT-SERVICE
          predicates:
            - Path=/api/clientes/**
        - id: account-service
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/api/cuentas/**
        - id: operation-service
          uri: lb://OPERATION-SERVICE
          predicates:
            - Path=/api/operaciones/**
        - id: auth-server
          uri: lb://AUTH-SERVER
          predicates:
            - Path=/api/auth/**
