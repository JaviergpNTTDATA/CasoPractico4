spring: 
  cloud: 
    gateway: 
      routes: 
        - id: cliente-service 
          uri: lb://CLIENTE-SERVICE 
          predicates: 
            - Path=/api/clientes/** 
        - id: cuenta-service 
          uri: lb://CUENTA-SERVICE 
          predicates: 
            - Path=/api/cuentas/** 
        - id: operacion-service 
          uri: lb://OPERACION-SERVICE 
          predicates: 
 
            - Path=/api/operaciones/** 
        - id: auth-server 
          uri: lb://AUTH-SERVER 
          predicates: 
            - Path=/api/auth/**